<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The House Isn't Empty</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="shell">
      <canvas id="game" width="1280" height="720" aria-label="The House Isn't Empty game screen"></canvas>
      <section id="start" class="overlay">
        <div class="panel">
          <p class="kicker">First-person pixel horror</p>
          <h1>The House Isn't Empty</h1>
          <p>
            Find the house anchors, survive the weak second floor, and restore power in the basement.
          </p>
          <button id="startButton">Enter</button>
          <p class="controls">WASD to move · drag/trackpad to look · E to interact</p>
        </div>
      </section>
      <section id="ending" class="overlay hidden">
        <div class="panel">
          <p class="kicker">The foundation</p>
          <h2>The lights came back wrong.</h2>
          <button id="againButton">Go back in</button>
        </div>
      </section>
      <div id="caption" aria-live="polite"></div>
      <div id="reticle"></div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
